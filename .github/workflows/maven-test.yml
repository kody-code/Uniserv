name: Maven Test Workflow
on:
  pull_request:
    branches: [ main, master ]
    paths-ignore:
      - '**.md'
      - '**.yaml'
      - '**.yml'
      - '**.txt'
      - 'docs/**'
  push:
    branches: [ main, master ]
    paths-ignore:
      - '**.md'
      - '**.yaml'
      - '**.yml'
      - '**.txt'
      - 'docs/**'
jobs:
  maven-test:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout repository code
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Run Maven test and save complete output
        run: |
          # 使用tee命令实现"控制台实时输出+文件持久化"，不丢失任何信息
          ./mvnw -B -V test 2>&1 | tee test-output.log
          # 捕获mvn test的真实退出码（管道中第一个命令的退出码）
          MVN_EXIT_CODE=${PIPESTATUS[0]}
          # 预览最后50行日志，方便快速判断结果
          echo -e "\n===== Maven Test Output Preview (Last 50 Lines) ====="
          tail -n 50 test-output.log
          # 还原Maven测试的真实退出码，确保Workflow状态判断准确
          exit $MVN_EXIT_CODE
        shell: /usr/bin/bash -e {0}
        continue-on-error: true

      - name: Upload Maven test output artifact
        uses: actions/upload-artifact@v6
        with:
          name: maven-test-output-jdk25-${{ github.run_id }}
          path: test-output.log
          retention-days: 7
