# 工作流名称，直观标识功能
name: Run Maven Test Before Merge and Save Output

# 触发条件：针对核心分支的PR创建、同步、重新打开
on:
  pull_request:
    branches: [ "main", "master", "dev" ] # 按需修改你的核心分支
    types: [ opened, synchronize, reopened ]

# 工作流权限配置（满足Artifacts上传和代码拉取需求）
permissions:
  contents: read
  actions: write

# 核心任务定义
jobs:
  maven-test-with-jdk21:
    # 运行环境：最新Ubuntu镜像（兼容JDK 21配置）
    runs-on: ubuntu-latest

    steps:
      # 步骤1：拉取PR中的仓库代码
      - name: Checkout repository code
        uses: actions/checkout@v4

      # 步骤2：配置JDK 21环境（核心：指定temurin发行版的JDK 21）
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21' # 明确指定JDK 21版本
          distribution: 'temurin' # 推荐的OpenJDK发行版，完美支持JDK 21
          cache: maven # 缓存Maven依赖，加速后续构建和测试

      # 步骤3：运行mvn test，同时输出到控制台和日志文件（优先排查问题）
      - name: Run Maven test (JDK 21) and save complete output
        run: |
          # 使用tee命令实现"控制台实时输出+文件持久化"，不丢失任何信息
          mvn -B -V test 2>&1 | tee test-output.log
          # 捕获mvn test的真实退出码（管道中第一个命令的退出码）
          MVN_EXIT_CODE=${PIPESTATUS[0]}
          # 预览最后50行日志，方便快速判断结果
          echo -e "\n===== Maven Test Output Preview (Last 50 Lines) ====="
          tail -n 50 test-output.log
          # 还原Maven测试的真实退出码，确保Workflow状态判断准确
          exit $MVN_EXIT_CODE
        shell: /usr/bin/bash -e {0}
        continue-on-error: true # 关键：即使测试失败，也继续执行后续步骤上传日志

      # 步骤4：上传测试输出日志作为Artifacts，方便后续下载排查
      - name: Upload Maven test output artifact (JDK 21)
        uses: actions/upload-artifact@v4
        with:
          # 唯一命名Artifacts，避免覆盖（包含运行ID和JDK版本标识）
          name: maven-test-output-jdk21-${{ github.run_id }}
          # 要上传的完整日志文件路径
          path: test-output.log
          # 日志保留时间：7天（按需调整，避免占用过多存储空间）
          retention-days: 7