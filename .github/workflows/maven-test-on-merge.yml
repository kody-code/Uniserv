name: Run Maven Test on Merge

on:
  pull_request:
    types: [ closed ]
    branches: [ main, master ]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'

jobs:
  maven-test:
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      # 步骤 3：运行 mvn test，生成详细测试报告（无论成功/失败都执行）
      - name: Run Maven test
        run: |
          # 1. 执行 mvn test，同时生成 HTML 测试报告（使用 surefire 插件）
          # 2. -B 批处理模式，-fae 失败后继续执行（捕获所有测试错误）
          # 3. 重定向命令输出到日志文件，留存完整执行记录
          mvn clean test -B -fae surefire-report:report > maven-test-execution.log 2>&1
        env:
          MAVEN_OPTS: '-Xmx2048m'

      # 步骤 4：上传测试产物（关键步骤：保存失败信息）
      - name: Upload test artifacts (reports & logs)
        uses: actions/upload-artifact@v4  # 官方上传产物动作，v4 稳定版
        with:
          # 产物名称，在 GitHub 页面显示
          name: maven-test-results-${{ github.run_id }}
          # 要上传的文件/目录（涵盖所有关键信息）
          path: |
            # 1. Maven 生成的 XML/HTML 测试报告（surefire 插件默认输出目录）
            target/surefire-reports/
            # 2. 完整的 mvn 命令执行日志（包含编译、测试、错误详情）
            maven-test-execution.log
            # 3. 可选：编译后的产物（如需排查编译问题）
            target/classes/
            # 4. 可选：测试代码编译产物
            target/test-classes/
          # 核心配置：无论前面步骤是否失败，都执行该上传步骤
          if: always()