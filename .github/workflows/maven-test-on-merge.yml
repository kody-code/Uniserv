# 工作流名称，在 GitHub Actions 页面显示
name: Run Maven Test on Merge

# 触发条件：指定分支被合并时触发（核心配置）
on:
  # 当有 PR（拉取请求）被合并到以下分支时，触发工作流
  pull_request:
    types: [ closed ]  # PR 状态为「关闭」（合并 PR 会触发 closed 状态）
    branches: [ main, master ]  # 目标合并分支（可根据你的仓库分支名修改）
    # 可选：仅当 PR 被「合并」而非「关闭未合并」时触发（更精准）
    paths-ignore: # 忽略无代码变更的文件（如 README、LICENSE），避免不必要的触发
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
      - '*.yml'
  push:
    branches: [ test-github-actions-mvn ]


# 工作流任务定义
jobs:
  # 单个任务：运行 Maven 测试
  maven-test:
    # 任务运行的虚拟机环境（GitHub 提供的官方镜像，可选 ubuntu-latest、windows-latest 等）
    runs-on: ubuntu-latest

    # 仅当 PR 被成功合并时才执行（过滤掉「关闭但未合并」的情况）
    if: github.event.pull_request.merged == true

    # 任务步骤（按顺序执行）
    steps:
      # 步骤 1：检出当前仓库代码（必须步骤，否则无法访问项目文件）
      - name: Checkout repository code
        uses: actions/checkout@v4  # 使用官方的 checkout 动作，v4 为稳定版

      # 步骤 2：配置 Java 环境（Maven 依赖 Java，必须步骤）
      - name: Set up JDK
        uses: actions/setup-java@v4  # 官方 Java 配置动作
        with:
          java-version: '21'  # 指定 Java 版本（根据你的项目需求修改，如 8、11、21）
          distribution: 'temurin'  # Java 发行版（temurin 为 Adoptium 提供，稳定可靠）
          cache: 'maven'  # 启用 Maven 依赖缓存，加速后续构建（避免重复下载依赖）

      # 步骤 3：运行 mvn test 执行单元测试
      - name: Run Maven test
        run: mvn test  # 核心命令：执行 Maven 测试生命周期
        # 可选：如果项目使用自定义 settings.xml，可添加参数：mvn test -s settings.xml
        env:
          # 可选：配置 Maven 环境变量（如私服地址、凭证等）
          MAVEN_OPTS: '-Xmx2048m'  # 调整 JVM 堆内存，避免大项目测试内存溢出